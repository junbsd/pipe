<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>동적 랜딩 페이지</title>
  <meta name="description" content="지역과 작업명에 따라 자동으로 바뀌는 서비스 랜딩 페이지">
  <style>
    :root{--ink:#17211b;--muted:#5d6b62;--line:#dce5df;--paper:#fbfcf8;--soft:#eef4ed;--brand:#12664f;--gold:#e6a93d;--danger:#bd2d2d;--white:#fff;--shadow:0 18px 50px rgba(23,33,27,.14);font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:light}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);line-height:1.55}a{color:inherit;text-decoration:none}button,input,textarea{font:inherit}.wrap{width:min(1120px,calc(100% - 32px));margin:0 auto}.top{position:sticky;top:0;z-index:10;background:rgba(251,252,248,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}.top .wrap{min-height:70px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:12px;min-width:0;font-weight:850}.brand img{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--brand)}.brand span{overflow-wrap:anywhere}.quick{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;white-space:nowrap}.call{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;border-radius:8px;background:var(--brand);color:#fff;font-weight:850}.hero{position:relative;isolation:isolate;overflow:hidden;min-height:clamp(560px,76vh,780px);display:flex;align-items:center;background:#20352b}.hero-media{position:absolute;inset:0;z-index:-2}.hero-media img,.hero-media video{width:100%;height:100%;object-fit:cover;display:block}.hero:after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(90deg,rgba(12,24,17,.86),rgba(12,24,17,.48) 52%,rgba(12,24,17,.18))}.hero-copy{color:#fff;padding:78px 0 92px}.eyebrow{display:inline-flex;align-items:center;min-height:34px;padding:0 12px;border:1px solid rgba(255,255,255,.34);border-radius:8px;background:rgba(255,255,255,.12);font-weight:800;backdrop-filter:blur(8px)}h1{max-width:780px;margin:22px 0 18px;font-size:clamp(38px,6vw,76px);line-height:1.03;letter-spacing:0;overflow-wrap:anywhere}.lead{max-width:680px;margin:0 0 30px;color:rgba(255,255,255,.88);font-size:clamp(17px,2vw,21px)}.buttons{display:flex;flex-wrap:wrap;gap:12px}.btn{min-height:48px;display:inline-flex;align-items:center;justify-content:center;padding:0 18px;border:0;border-radius:8px;background:var(--gold);color:#19140a;cursor:pointer;font-weight:850}.btn.ghost{border:1px solid rgba(255,255,255,.36);background:rgba(255,255,255,.12);color:#fff;backdrop-filter:blur(10px)}section{padding:78px 0}.head{max-width:720px;margin-bottom:30px}.kicker{color:var(--brand);font-weight:850;margin-bottom:8px}h2{margin:0;font-size:clamp(28px,4vw,44px);line-height:1.12;letter-spacing:0}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:22px;box-shadow:0 8px 24px rgba(23,33,27,.06)}.card strong{display:block;font-size:20px;margin-bottom:8px;overflow-wrap:anywhere}.areas{background:var(--soft)}.chips{display:flex;flex-wrap:wrap;gap:10px;margin:0;padding:0;list-style:none}.chips li{min-height:38px;display:inline-flex;align-items:center;padding:0 13px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:800}.media-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.media-card{padding:0;overflow:hidden;min-height:280px}.media-card img,.media-card video{width:100%;height:100%;min-height:280px;object-fit:cover;display:block}.cta{padding:64px 0 82px;background:#17211b;color:#fff}.cta .wrap{display:grid;grid-template-columns:1fr auto;align-items:center;gap:24px}.footer{padding:26px 0;color:var(--muted);background:#fff;border-top:1px solid var(--line);font-size:14px}.backdrop{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:18px;background:rgba(7,12,9,.62)}.modal,.panel{width:min(980px,100%);max-height:min(88vh,900px);overflow:auto;background:#fff;border-radius:8px;box-shadow:var(--shadow)}.login{width:min(420px,100%);padding:26px}.field{display:grid;gap:7px;margin-top:14px}.field label{color:var(--muted);font-size:14px;font-weight:800}.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:#fff}.field textarea{min-height:92px;resize:vertical}.actions{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:10px;margin-top:18px}.plain{min-height:44px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 14px;cursor:pointer;font-weight:850}.danger{color:var(--danger);border-color:rgba(189,45,45,.35)}.panel-head{position:sticky;top:0;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.94);backdrop-filter:blur(10px)}.panel-body{padding:22px}.admin-section{padding:20px 0;border-bottom:1px solid var(--line)}.admin-section:first-child{padding-top:0}.admin-section h3{margin:0 0 4px;font-size:19px}.two{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.help,.err{margin:8px 0 0;color:var(--muted);font-size:13px}.err{color:var(--danger);min-height:20px}@media(max-width:820px){.top .wrap{min-height:64px}.quick span{display:none}.hero{min-height:620px}.hero:after{background:linear-gradient(180deg,rgba(12,24,17,.86),rgba(12,24,17,.58))}.grid,.media-grid,.cta .wrap,.two{grid-template-columns:1fr}section{padding:56px 0}.cta .btn{width:100%}}@media(max-width:520px){.wrap{width:min(100% - 24px,1120px)}.brand img{width:36px;height:36px}.call{min-height:40px;padding:0 12px}.buttons .btn{width:100%}.card{padding:18px}.panel-head,.panel-body{padding-left:16px;padding-right:16px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (function(){
      "use strict";
      var STORAGE_KEY="dynamicLandingConfig.v1";
      var PASSWORD_HASH="b0d107a1cb94cd60c513a8636f99b8d700154887e2a96f0310a1b5f3e60a6ddd";
      var DEFAULT_CONFIG={businessName:"클린라인 케어",logoUrl:"https://images.unsplash.com/photo-1585704032915-c3400ca199e7?auto=format&fit=crop&w=240&q=80",phone:"0507-1234-5678",defaultLoc:"서울",defaultTask:"하수구막힘",heroMediaUrl:"https://images.unsplash.com/photo-1621905251918-48416bd8575a?auto=format&fit=crop&w=1800&q=82",heroMediaType:"image",eyebrowTemplate:"{loc} 긴급 출동 가능",titleTemplate:"{loc} {task}, 오늘 바로 해결합니다",leadTemplate:"막힘, 역류, 누수처럼 생활을 멈추게 하는 문제를 현장 상황에 맞춰 빠르게 진단하고 정리합니다.",bodyTitleTemplate:"{loc}에서 많이 찾는 {task} 서비스",bodyTextTemplate:"작업 전 원인을 먼저 확인하고 필요한 범위만 안내합니다. 현장 사진과 증상을 알려주시면 방문 가능 시간과 예상 절차를 친절히 안내해 드립니다.",ctaTitleTemplate:"{loc} {task} 상담이 필요하신가요?",ctaText:"전화 한 통으로 방문 가능 시간과 준비 사항을 확인할 수 있습니다.",areas:["강남","송파","마포","분당","일산","인천","수원","용인"],services:[{title:"배관 막힘 진단",text:"내시경과 현장 점검으로 원인을 먼저 확인합니다."},{title:"싱크대 및 욕실 배수",text:"생활 공간을 최대한 깨끗하게 유지하며 작업합니다."},{title:"긴급 방문 상담",text:"가능한 일정과 비용 범위를 투명하게 안내합니다."}],proofs:[{title:"작업 전 안내",text:"필요한 작업과 예상 시간을 먼저 설명합니다."},{title:"현장 맞춤 처리",text:"건물 구조와 배관 상태에 맞춰 무리 없는 방법을 선택합니다."},{title:"마무리 확인",text:"배수 상태와 주변 정리를 확인한 뒤 작업을 마칩니다."}],media:[{type:"image",url:"https://images.unsplash.com/photo-1603712725038-e9334ae8f39f?auto=format&fit=crop&w=1200&q=80",alt:"청결한 작업 도구"},{type:"image",url:"https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=900&q=80",alt:"정리된 서비스 현장"}]};
      var app=document.getElementById("app");
      function copyDefault(){return JSON.parse(JSON.stringify(DEFAULT_CONFIG));}
      function loadConfig(){try{var saved=localStorage.getItem(STORAGE_KEY);if(!saved)return copyDefault();var parsed=JSON.parse(saved);var base=copyDefault();var merged=Object.assign(base,parsed);merged.areas=Array.isArray(parsed.areas)?parsed.areas:base.areas;merged.services=Array.isArray(parsed.services)?parsed.services:base.services;merged.proofs=Array.isArray(parsed.proofs)?parsed.proofs:base.proofs;merged.media=Array.isArray(parsed.media)?parsed.media:base.media;return merged;}catch(e){return copyDefault();}}
      function safeDecode(value){if(!value)return "";try{return decodeURIComponent(String(value).replace(/\+/g," ")).trim();}catch(e){return String(value).trim();}}
      function route(config){var params=new URLSearchParams(location.search);var parts=location.pathname.split("/").map(safeDecode).filter(Boolean);return{loc:safeDecode(params.get("loc"))||parts[0]||config.defaultLoc||DEFAULT_CONFIG.defaultLoc,task:safeDecode(params.get("task"))||parts[1]||config.defaultTask||DEFAULT_CONFIG.defaultTask};}
      function esc(value){return String(value==null?"":value).replace(/[&<>"']/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch];});}
      function fill(text,r){return String(text||"").replaceAll("{loc}",r.loc).replaceAll("{task}",r.task);}
      function mediaTag(item){var url=esc(item.url||"");if(!url)return "";if(item.type==="video")return "<video src='"+url+"' muted autoplay loop playsinline controls></video>";return "<img src='"+url+"' alt='"+esc(item.alt||"")+"'>";}
      function render(){var c=loadConfig();var r=route(c);var phoneHref=String(c.phone||"").replace(/[^\d+]/g,"");document.title=r.loc+" "+r.task+" | "+c.businessName;app.innerHTML="<header class='top'><div class='wrap'><a class='brand' href='/' aria-label='"+esc(c.businessName)+" 홈'><img src='"+esc(c.logoUrl)+"' alt=''><span>"+esc(c.businessName)+"</span></a><div class='quick'><span>"+esc(r.loc)+" 빠른 상담</span><a class='call' href='tel:"+esc(phoneHref)+"'>"+esc(c.phone)+"</a></div></div></header><main><section class='hero'><div class='hero-media'>"+mediaTag({type:c.heroMediaType,url:c.heroMediaUrl,alt:c.businessName})+"</div><div class='wrap hero-copy'><div class='eyebrow'>"+esc(fill(c.eyebrowTemplate,r))+"</div><h1>"+esc(fill(c.titleTemplate,r))+"</h1><p class='lead'>"+esc(fill(c.leadTemplate,r))+"</p><div class='buttons'><a class='btn' href='tel:"+esc(phoneHref)+"'>전화 상담하기</a><a class='btn ghost' href='#service-info'>서비스 보기</a></div></div></section><section id='service-info'><div class='wrap'><div class='head'><div class='kicker'>Service</div><h2>"+esc(fill(c.bodyTitleTemplate,r))+"</h2><p class='muted'>"+esc(fill(c.bodyTextTemplate,r))+"</p></div><div class='grid'>"+c.services.map(function(x){return "<article class='card'><strong>"+esc(fill(x.title,r))+"</strong><p class='muted'>"+esc(fill(x.text,r))+"</p></article>";}).join("")+"</div></div></section><section class='areas'><div class='wrap'><div class='head'><div class='kicker'>Coverage</div><h2>주요 거점</h2><p class='muted'>관리자 화면에서 지역 목록을 자유롭게 수정할 수 있습니다.</p></div><ul class='chips'>"+c.areas.map(function(x){return "<li>"+esc(x)+"</li>";}).join("")+"</ul></div></section><section><div class='wrap'><div class='head'><div class='kicker'>Process</div><h2>안내부터 마무리까지 차분하게 진행합니다</h2></div><div class='grid'>"+c.proofs.map(function(x){return "<article class='card'><strong>"+esc(fill(x.title,r))+"</strong><p class='muted'>"+esc(fill(x.text,r))+"</p></article>";}).join("")+"</div></div></section><section><div class='wrap'><div class='head'><div class='kicker'>Scene</div><h2>현장 이미지</h2></div><div class='media-grid'>"+c.media.map(function(x){return "<figure class='card media-card'>"+mediaTag(x)+"</figure>";}).join("")+"</div></div></section><section class='cta'><div class='wrap'><div><h2>"+esc(fill(c.ctaTitleTemplate,r))+"</h2><p>"+esc(fill(c.ctaText,r))+"</p></div><a class='btn' href='tel:"+esc(phoneHref)+"'>"+esc(c.phone)+"</a></div></section></main><footer class='footer'><div class='wrap'>© "+new Date().getFullYear()+" "+esc(c.businessName)+". All rights reserved.</div></footer>";}
      async function sha256(value){var bytes=new TextEncoder().encode(value);var buf=await crypto.subtle.digest("SHA-256",bytes);return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");}
      function backdrop(content){var b=document.createElement("div");b.className="backdrop";b.appendChild(content);b.addEventListener("click",function(e){if(e.target===b)b.remove();});document.body.appendChild(b);return b;}
      function openLogin(){if(document.querySelector("[data-login]")||document.querySelector("[data-panel]"))return;var form=document.createElement("form");form.className="modal login";form.dataset.login="true";form.innerHTML="<h2>인증</h2><div class='field'><label for='pw'>비밀번호</label><input id='pw' type='password' autocomplete='current-password' required></div><p class='err' aria-live='polite'></p><div class='actions'><button class='plain' type='button' data-close>닫기</button><button class='btn' type='submit'>확인</button></div>";var b=backdrop(form);var input=form.querySelector("#pw");var err=form.querySelector(".err");form.querySelector("[data-close]").onclick=function(){b.remove();};form.onsubmit=async function(e){e.preventDefault();err.textContent="";if(await sha256(input.value)!==PASSWORD_HASH){err.textContent="비밀번호가 올바르지 않습니다.";input.select();return;}b.remove();openPanel();};setTimeout(function(){input.focus();},0);}
      function field(name,label,value){return "<div class='field'><label for='"+name+"'>"+label+"</label><input id='"+name+"' name='"+name+"' value='"+esc(value)+"'></div>";}
      function area(name,label,value,h){return "<div class='field'><label for='"+name+"'>"+label+"</label><textarea id='"+name+"' name='"+name+"' style='min-height:"+(h||95)+"px'>"+esc(value)+"</textarea></div>";}
      function lines(v){return String(v||"").split("\n").map(function(x){return x.trim();}).filter(Boolean);}
      function arr(v){try{var parsed=JSON.parse(v);if(!Array.isArray(parsed))throw new Error();return parsed;}catch(e){throw new Error("JSON 입력 형식을 확인해 주세요.");}}
      function openPanel(){if(document.querySelector("[data-panel]"))return;var c=loadConfig();var form=document.createElement("form");form.className="panel";form.dataset.panel="true";form.innerHTML="<div class='panel-head'><div><h2>콘텐츠 관리</h2><p class='help'>저장하면 LocalStorage에 반영되고 화면이 다시 열립니다.</p></div><button class='plain' type='button' data-close>닫기</button></div><div class='panel-body'><section class='admin-section'><h3>기본 정보</h3><div class='two'>"+field("businessName","상호명",c.businessName)+field("phone","전화번호",c.phone)+field("defaultLoc","기본 지역",c.defaultLoc)+field("defaultTask","기본 작업명",c.defaultTask)+field("logoUrl","로고 이미지 URL",c.logoUrl)+field("heroMediaUrl","대표 이미지/영상 URL",c.heroMediaUrl)+field("heroMediaType","대표 미디어 타입 image 또는 video",c.heroMediaType)+"</div></section><section class='admin-section'><h3>문구 템플릿</h3><p class='help'>{loc}, {task}를 넣으면 접속 주소에 맞춰 자동 치환됩니다.</p>"+area("eyebrowTemplate","상단 짧은 문구",c.eyebrowTemplate)+area("titleTemplate","메인 타이틀",c.titleTemplate)+area("leadTemplate","메인 본문",c.leadTemplate)+area("bodyTitleTemplate","서비스 섹션 타이틀",c.bodyTitleTemplate)+area("bodyTextTemplate","서비스 섹션 본문",c.bodyTextTemplate)+area("ctaTitleTemplate","하단 문의 타이틀",c.ctaTitleTemplate)+area("ctaText","하단 문의 본문",c.ctaText)+"</section><section class='admin-section'><h3>주요 거점명 리스트</h3><p class='help'>한 줄에 하나씩 입력하세요.</p>"+area("areas","지역 목록",c.areas.join("\n"))+"</section><section class='admin-section'><h3>서비스 안내 문구</h3><p class='help'>JSON 배열로 수정합니다. title과 text를 사용하세요.</p>"+area("services","서비스 카드 JSON",JSON.stringify(c.services,null,2),160)+"</section><section class='admin-section'><h3>진행 안내 문구</h3><p class='help'>JSON 배열로 수정합니다. title과 text를 사용하세요.</p>"+area("proofs","진행 카드 JSON",JSON.stringify(c.proofs,null,2),160)+"</section><section class='admin-section'><h3>이미지 및 영상 URL</h3><p class='help'>JSON 배열로 수정합니다. type은 image 또는 video, url과 alt를 입력하세요.</p>"+area("media","미디어 JSON",JSON.stringify(c.media,null,2),170)+"</section><p class='err' data-err aria-live='polite'></p><div class='actions'><button class='plain danger' type='button' data-reset>기본값 복원</button><button class='btn' type='submit'>설정 저장</button></div></div>";var b=backdrop(form);var err=form.querySelector("[data-err]");form.querySelector("[data-close]").onclick=function(){b.remove();};form.querySelector("[data-reset]").onclick=function(){if(confirm("저장된 설정을 모두 지우고 기본값으로 복원할까요?")){localStorage.removeItem(STORAGE_KEY);location.reload();}};form.onsubmit=function(e){e.preventDefault();err.textContent="";try{var data=new FormData(form);var next={businessName:data.get("businessName").trim()||DEFAULT_CONFIG.businessName,phone:data.get("phone").trim()||DEFAULT_CONFIG.phone,defaultLoc:data.get("defaultLoc").trim()||DEFAULT_CONFIG.defaultLoc,defaultTask:data.get("defaultTask").trim()||DEFAULT_CONFIG.defaultTask,logoUrl:data.get("logoUrl").trim(),heroMediaUrl:data.get("heroMediaUrl").trim(),heroMediaType:data.get("heroMediaType").trim()==="video"?"video":"image",eyebrowTemplate:data.get("eyebrowTemplate").trim(),titleTemplate:data.get("titleTemplate").trim(),leadTemplate:data.get("leadTemplate").trim(),bodyTitleTemplate:data.get("bodyTitleTemplate").trim(),bodyTextTemplate:data.get("bodyTextTemplate").trim(),ctaTitleTemplate:data.get("ctaTitleTemplate").trim(),ctaText:data.get("ctaText").trim(),areas:lines(data.get("areas")),services:arr(data.get("services")),proofs:arr(data.get("proofs")),media:arr(data.get("media"))};if(!next.logoUrl||!next.heroMediaUrl)throw new Error("로고와 대표 미디어 URL은 비워둘 수 없습니다.");if(!next.areas.length)next.areas=DEFAULT_CONFIG.areas;localStorage.setItem(STORAGE_KEY,JSON.stringify(next));location.reload();}catch(ex){err.textContent=ex.message||"입력값을 확인해 주세요.";}};}
      function secretParam(){var p=new URLSearchParams(location.search);return p.get("admin")==="true"||p.get("setting")==="open";}
      function shortcut(){var count=0,last=0;window.addEventListener("keydown",function(e){if(!(e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()==="y"))return;e.preventDefault();var now=Date.now();count=now-last<2500?count+1:1;last=now;if(count>=2){count=0;openLogin();}});}
      render();shortcut();if(secretParam())window.addEventListener("load",openLogin,{once:true});
    })();
  </script>
</body>
</html>
